name: Update Leaderboard

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh leaderboard files
        env:
          LEADERBOARD_SOURCE_URL: ${{ vars.LEADERBOARD_SOURCE_URL }}
          PLAYERS_FILE: ${{ vars.PLAYERS_FILE }}
        run: python scripts/update_leaderboard.py

      - name: Commit updated leaderboard data
        run: |
          if git diff --quiet -- data/leaderboard.json data/leaderboard.js; then
            echo "No leaderboard changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json data/leaderboard.js
          git commit -m "Update leaderboard data"
          git push
